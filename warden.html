<!DOCTYPE html>
<html>
<head>
  <title>Warden Dashboard</title>
  <style>
    table { border-collapse: collapse; width: 80%; }
    th, td { border: 1px solid black; padding: 5px; text-align: left; }
    input { margin: 5px; }
  </style>
</head>
<body>

<h1>Warden Dashboard</h1>

<h3>Add / Edit Student</h3>
<input id="studentId" type="hidden">
<input id="fullName" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="roomNumber" placeholder="Room Number">
<button onclick="saveStudent()">Save</button>

<h3>Students</h3>
<table id="studentTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Room</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const apiUrl = "http://localhost:5000/api/students";

async function loadStudents() {
  const res = await fetch(apiUrl);
  const students = await res.json();
  const tbody = document.querySelector("#studentTable tbody");
  tbody.innerHTML = "";
  students.forEach(s => {
    tbody.innerHTML += `
      <tr>
        <td>${s.fullName}</td>
        <td>${s.phone}</td>
        <td>${s.email || ""}</td>
        <td>${s.roomNumber || ""}</td>
        <td>
          <button onclick="editStudent('${s._id}', '${s.fullName}', '${s.phone}', '${s.email || ""}', '${s.roomNumber || ""}')">Edit</button>
          <button onclick="deleteStudent('${s._id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

function editStudent(id, name, phone, email, room) {
  document.getElementById("studentId").value = id;
  document.getElementById("fullName").value = name;
  document.getElementById("phone").value = phone;
  document.getElementById("email").value = email;
  document.getElementById("roomNumber").value = room;
}

async function saveStudent() {
  const id = document.getElementById("studentId").value;
  const student = {
    fullName: document.getElementById("fullName").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    roomNumber: document.getElementById("roomNumber").value
  };

  if (id) {
    // Update
    await fetch(`${apiUrl}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(student)
    });
  } else {
    // Add new
    await fetch(apiUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(student)
    });
  }

  // Clear form
  document.getElementById("studentId").value = "";
  document.getElementById("fullName").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("email").value = "";
  document.getElementById("roomNumber").value = "";

  loadStudents();
}

async function deleteStudent(id) {
  if (confirm("Are you sure you want to delete this student?")) {
    await fetch(`${apiUrl}/${id}`, { method: "DELETE" });
    loadStudents();
  }
}

// Load table on page load
loadStudents();
</script>

</body>
</html>
